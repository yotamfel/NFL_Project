name: NFL ETL Refresh

on:
  schedule:
    # Regular season + playoffs (Sep-Dec, Jan-Feb): every Wednesday 08:00 UTC
    - cron: '0 8 * 9-12 3'
    - cron: '0 8 * 1-2 3'
    # Combine + draft period (Mar-May): 1st of each month
    - cron: '0 8 1 3-5 *'
    # Jun-Aug: no scheduled runs (off-season, no new game data)
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI at any time

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ETL dependencies
        run: pip install --no-cache-dir -r etl/requirements.txt

      # ── Core box-score stats (also runs supplement_players internally) ─────
      - name: Supplement seasons (passing / offense / defense / kicking / punting / returns)
        working-directory: etl
        run: python supplement_seasons.py

      # ── Draft + Combine ───────────────────────────────────────────────────
      - name: Supplement draft picks
        working-directory: etl
        run: python supplement_draft.py

      - name: Supplement combine measurements
        working-directory: etl
        run: python supplement_combine.py

      # ── Supplementary tables ──────────────────────────────────────────────
      - name: Load injury reports
        working-directory: etl
        run: python run_injuries.py

      - name: Load snap counts
        working-directory: etl
        run: python run_snap_counts.py

      - name: Load advanced receiving stats
        working-directory: etl
        run: python run_adv_receiving.py

      - name: Load Next Gen Stats
        working-directory: etl
        run: python run_ngs_stats.py

      # ── Weekly game-level stats ──────────────────────────────────────────
      - name: Load weekly stats
        working-directory: etl
        run: python load_weekly_stats.py

      # ── Rebuild career aggregation views ─────────────────────────────────
      - name: Rebuild career views
        working-directory: etl
        run: python build_career_views.py

      # ── Rebuild FDV scores ───────────────────────────────────────────────
      - name: Rebuild FDV
        working-directory: etl
        run: python build_fdv_v3.py --write

      # ── Anomaly detection (runs last, needs updated career views) ────────
      - name: Detect season anomalies
        working-directory: etl
        run: python detect_anomalies.py
